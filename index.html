async function initFirebase(){

    db=firebase.firestore();auth=firebase.auth();
    db.enablePersistence({synchronizeTabs:true}).catch(()=>{});
    auth.onAuthStateChanged(async user=>{
      if(user){
        currentUser=user;
        try{
          await loadUserData(user.uid);S._prevBadges=earnedBadges();lsSave();
          if(S.screen==='auth'){

function getTodayChapters(pid){
  const p=PLANS.find(x=>x.id===pid);if(!p)return[];
  const s=S.planStartDates[pid];if(!s)return[];
  const start=new Date(s);start.setHours(0,0,0,0);
  const today=new Date();today.setHours(0,0,0,0);
  const day=Math.floor((today-start)/864e5);
  if(day<0||day>=p.days)return[];
  const pp=p.chapters.length/p.days;
  return p.chapters.slice(Math.floor(day*pp),Math.min(Math.ceil((day+1)*pp),p.chapters.length));
}
function getFirstActivePlanWithToday(){for(const pid of S.activePlans){const chs=getTodayChapters(pid);if(chs.length)return{pid,chs};}return null;}

// ── BIBLE API (with permanent cache) ─────────────────────────────────────────
async function fetchChapterVerses(bid,ch){
  const key=bid+'-'+ch;if(verseCache[key])return verseCache[key];
  try{
    const url=`https://bible-api.com/${encodeURIComponent(BOOK_API[bid]||bid)}+${ch}?translation=${S.selectedTrans||'kjv'}`;
    const res=await fetch(url);if(!res.ok)throw new Error();
    const data=await res.json();if(!data.verses?.length)throw new Error();
    const v=data.verses.map(x=>x.text.trim().replace(/\n/g,' '));
    verseCache[key]=v;vcSave(key,v);return v;
  }catch(e){return['Unable to load verse text. Check your internet connection.'];}
}
// Pre-cache today's assigned chapters in the background
async function preCacheToday(){
  const t=getFirstActivePlanWithToday();if(!t)return;
  for(const c of t.chs){if(!verseCache[c.bid+'-'+c.ch])await fetchChapterVerses(c.bid,c.ch).catch(()=>{});}
}

function getMonthActivity(year, month){
  const key=year+'-'+String(month).padStart(2,'0');
  const result={};
  Object.entries(S.activity).forEach(([k,v])=>{
    if(k.startsWith(key)){result[parseInt(k.split('-')[2])]=v;}
  });
  return result;

function getReadingStats(){
  const totalCh=totalRead();
  const booksStarted=BOOKS.filter(b=>bkRead(b.id)>0).length;
  const booksFinished=BOOKS.filter(b=>bkRead(b.id)===b.ch).length;
  const monthly={};
  Object.entries(S.activity).forEach(([k,v])=>{
    const m=k.slice(0,7);monthly[m]=(monthly[m]||0)+v;
  });
  const monthList=Object.entries(monthly).sort((a,b)=>a[0]<b[0]?-1:1).slice(-6);
  let mostRead=null,mostCount=0;
  BOOKS.forEach(b=>{const c=bkRead(b.id);if(c>mostCount){mostCount=c;mostRead=b;}});
  const activeDays=Object.values(S.activity).filter(v=>v>0).length;
  const avgPerDay=activeDays?Math.round(totalCh/activeDays*10)/10:0;
  return{totalCh,booksStarted,booksFinished,monthList,mostRead,mostCount,activeDays,avgPerDay};
}

// ── VERSE SEARCH ─────────────────────────────────────────────────────────────
const vsCache={};// cached search results
async function searchVerses(query){
  if(!query||query.length<3)return[];
  const q=query.toLowerCase().trim();
  if(vsCache[q])return vsCache[q];
  // Search through cached verses first (fast, offline)
  const results=[];
  for(const[key,verses] of Object.entries(verseCache)){
    const[bid,ch]=key.split('-');
    const b=bk(bid);if(!b)continue;
    verses.forEach((v,i)=>{
      if(v.toLowerCase().includes(q)){
        results.push({bid,ch:parseInt(ch),vn:i+1,text:v,bookName:b.name,ref:b.name+' '+ch+':'+(i+1)});
      }
    });
    if(results.length>=50)break;
  }

}

function rBibleMap(){

let vsQuery='', vsResults=[], vsSearching=false;
function rVerseSearch(){
  const rows = vsResults.map(r=>{
    const safe=r.text.replace(/'/g,"\'").replace(/"/g,'\\"');
    const isHL=Object.keys(S.highlights).some(k=>k.startsWith(r.bid+'-'+r.ch+'-'+r.vn));

      +'<div style="font-size:10px;color:var(--mut);margin-top:5px">'+(isHL?'★ Highlighted · ':'')+'Tap to read chapter</div>'
      +'</div>';
  }).join('');
  return '<div style="font-family:Cinzel,serif;font-size:18px;margin-bottom:14px">Search the Bible</div>'
    +'<div class="srch" style="margin-bottom:10px"><i class="ti ti-search"></i>'
    +'<input id="vsInput" placeholder="Search by word or phrase…" value="'+vsQuery+'" oninput="runVerseSearch(this.value)" autofocus></div>'
    +'<div style="font-size:12px;color:var(--mut);margin-bottom:13px">Searches chapters you have already opened · Open more chapters to expand results</div>'
    +(vsSearching?'<div style="text-align:center;padding:20px"><div class="spin"></div></div>'
    :vsResults.length?'<div>'+rows+'</div>'
    :vsQuery.length>=3?'<div class="card" style="text-align:center;padding:20px;color:var(--mut)">No results in cached chapters. Open those chapters first to make them searchable.</div>'
    :'')
    +'<button class="btn-g" style="margin-top:10px" onclick="closeModal()">Close</button>';
}
async function runVerseSearch(q){
  vsQuery=q;
  if(q.length<3){vsResults=[];vsSearching=false;const mp=document.querySelector('.mp');if(mp)mp.innerHTML='<div class="mh"></div>'+rVerseSearch();return;}
  vsSearching=true;
  const mp=document.querySelector('.mp');if(mp)mp.innerHTML='<div class="mh"></div>'+rVerseSearch();
  vsResults=await searchVerses(q);
  vsSearching=false;
  if(mp)mp.innerHTML='<div class="mh"></div>'+rVerseSearch();
}


// ── STATS SCREEN ──────────────────────────────────────────────────────────────
function rStats(){
  const st=getReadingStats();
  const now=new Date();const yr=now.getFullYear();const mo=now.getMonth()+1;
  const monthNames=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const daysInMonth=new Date(yr,mo,0).getDate();
  const firstDow=new Date(yr,mo-1,1).getDay();// 0=Sun
  const act=getMonthActivity(yr,mo);
  const today=now.getDate();

  // Calendar
  let calCells='';
  ['S','M','T','W','T','F','S'].forEach(d=>{calCells+='<div style="text-align:center;font-size:10px;color:var(--mut);padding-bottom:4px">'+d+'</div>';});
  for(let i=0;i<firstDow;i++)calCells+='<div class="cal-day empty"></div>';
  for(let d=1;d<=daysInMonth;d++){
    const isToday=d===today;const read=act[d]>0;
    calCells+='<div class="cal-day'+(read?' rd':'')+(isToday?' today':'')+'" title="'+d+' '+monthNames[mo-1]+'">'+(isToday?'<b>'+d+'</b>':d)+'</div>';

  // Monthly bar chart
  let chartBars='';
  const maxVal=Math.max(1,...st.monthList.map(([,v])=>v));

    chartBars+='<div class="chart-bar-wrap"><div class="chart-bar" style="height:'+h+'px"></div><div class="chart-lbl">'+monthNames[m-1]+'</div></div>';
  });

  return '<div class="ttl">Reading Stats</div>'
    +'<div class="stat-row">'
    +'<div class="stat-cell"><div style="font-family:Cinzel,serif;font-size:28px;font-weight:600;color:var(--acc)">'+st.totalCh+'</div><div class="stat-lbl">Chapters Read</div></div>'

    +'<div class="stat-cell"><div style="font-family:Cinzel,serif;font-size:28px;font-weight:600;color:var(--acc)">'+S.streak.best+'</div><div class="stat-lbl">Best Streak</div></div>'
    +'</div>'
    +'<div class="stat-row">'
    +'<div class="stat-cell"><div style="font-family:Cinzel,serif;font-size:28px;font-weight:600;color:var(--acc)">'+st.activeDays+'</div><div class="stat-lbl">Days Active</div></div>'
    +'<div class="stat-cell"><div style="font-family:Cinzel,serif;font-size:28px;font-weight:600;color:var(--acc)">'+st.avgPerDay+'</div><div class="stat-lbl">Avg Ch/Day</div></div>'
    +'<div class="stat-cell"><div style="font-family:Cinzel,serif;font-size:28px;font-weight:600;color:var(--acc)">'+st.booksStarted+'</div><div class="stat-lbl">Books Started</div></div>'
    +'</div>'
    +(st.mostRead?'<div class="card"><div class="lbl">Most Read Book</div><div style="display:flex;align-items:center;gap:10px"><i class="ti ti-trophy" style="font-size:24px;color:var(--acc)"></i><div><div style="font-size:16px;font-weight:500">'+st.mostRead.name+'</div><div style="font-size:12px;color:var(--mut)">'+st.mostCount+' of '+st.mostRead.ch+' chapters</div></div></div></div>':'')
    +'<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div class="lbl" style="margin-bottom:0">'+monthNames[mo-1]+' '+yr+'</div><div style="font-size:12px;color:var(--acc)">'+Object.keys(act).length+' days read</div></div>'
    +'<div style="display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:6px">'+calCells+'</div></div>'
    +(st.monthList.length?'<div class="card"><div class="lbl" style="margin-bottom:4px">Monthly Chapters (last 6 months)</div><div class="chart-wrap">'+chartBars+'</div></div>':'')

    +'<div style="height:16px"></div>';

const RS={verses:[],loading:false,error:false,scrollPct:0};

function rReader(){
  const r=S.reader;if(!r)return'';const b=bk(r.bid);if(!b)return'';
  const isRead=chRead(r.bid,r.ch);const note=S.notes[ck(r.bid,r.ch)]||'';
  const tn=TRANSLATIONS.find(t=>t.id===S.selectedTrans)?.name||'KJV';
  const est=RS.verses.length?estReadTime(RS.verses.length):0;
  let vhtml='';
  if(RS.loading)vhtml=`<div style="display:flex;flex-direction:column;align-items:center;padding:40px;gap:12px"><div class="spin"></div><div style="font-size:13px;color:var(--mut)">Loading ${b.name} ${r.ch}…</div></div>`;
  else if(RS.error)vhtml=`<div class="card" style="text-align:center;padding:24px"><i class="ti ti-wifi-off" style="font-size:32px;color:var(--mut);display:block;margin-bottom:10px"></i><div style="font-size:14px;font-weight:500;margin-bottom:6px">Could not load verses</div><button class="btn-s" onclick="loadReaderVerses()">Try Again</button></div>`;
  else vhtml=RS.verses.map((v,i)=>{const hk=r.bid+'-'+r.ch+'-'+(i+1);const hl=S.highlights[hk];const safe=v.replace(/\\/g,'\\\\').replace(/'/g,"\\'");return'<div class="verse-block '+(hl?'hl':'')+'" onclick="toggleHL(\''+hk+'\',\''+safe+'\')"><div class="vnum">'+( i+1)+'</div><div class="vtxt">'+v+'</div><div style="font-size:10px;color:'+(hl?'var(--acc)':'var(--mut)')+';margin-top:5px">'+(hl?'★ Highlighted · tap to remove':'Tap to highlight')+'</div></div>';}).join('')+'<div style="height:20px"></div>';
  return'<div class="mo2" id="readerWrap"><div class="mo2hd"><button class="btn-sg" style="padding:7px 10px" onclick="closeReader()"><i class="ti ti-arrow-left"></i></button><div style="flex:1"><div style="font-family:Cinzel,serif;font-size:15px">'+b.name+' · Ch '+r.ch+'</div><div style="font-size:11px;color:var(--mut)">'+tn+(est?' · ~'+est+' min':'')+' · '+b.ch+' chs</div></div><div style="display:flex;align-items:center;gap:6px"><div class="fsize-ctrl"><button onclick="changeFontSize(-1)"><i class="ti ti-minus" style="font-size:13px"></i></button><span style="font-size:12px;color:var(--mut);min-width:20px;text-align:center">'+S.fontSize+'</span><button onclick="changeFontSize(1)"><i class="ti ti-plus" style="font-size:13px"></i></button></div>'+(r.ch>1?'<button class="btn-sg" style="padding:7px 10px" onclick="navReader(-1)"><i class="ti ti-chevron-left"></i></button>':'')+(r.ch<b.ch?'<button class="btn-sg" style="padding:7px 10px" onclick="navReader(1)"><i class="ti ti-chevron-right"></i></button>':'')+'</div></div><div class="rdprog"><div class="rdprogf" id="rdprogf" style="width:'+RS.scrollPct+'%"></div></div><div class="mo2bd" id="readerBody" onscroll="updateReadingProgress(this)" ontouchstart="touchStartX=event.touches[0].clientX" ontouchend="handleSwipe(event)"><div style="display:flex;gap:7px;margin-bottom:15px;flex-wrap:wrap"><button class="btn-sg" onclick="openNote(\''+r.bid+'\','+r.ch+')"><i class="ti ti-pencil"></i> '+(note?'Edit Note':'Add Note')+'</button><button class="'+(isRead?'btn-sg':'btn-s')+'" onclick="toggleCh(\''+r.bid+'\','+r.ch+')" style="'+(isRead?'border-color:var(--grn);color:var(--grn)':'')+'">'+'<i class="ti ti-'+(isRead?'check':'book')+'"></i> '+(isRead?'Read ✓':'Mark Read')+'</button>'+(RS.verses.length?'<button class="btn-sg" onclick="shareVerse(\''+b.name+' '+r.ch+'\',\''+RS.verses[0]?.slice(0,80).replace(/'/g,"\\'")+'\')"><i class="ti ti-share"></i></button>':'')+'</div>'+vhtml+'</div></div>';}

function updateReadingProgress(el){
  const pct=Math.round(el.scrollTop/(el.scrollHeight-el.clientHeight)*100)||0;
  RS.scrollPct=pct;const bar=G('rdprogf');if(bar)bar.style.width=pct+'%';
}
function handleSwipe(e){
  const dx=e.changedTouches[0].clientX-touchStartX;
  if(Math.abs(dx)<60)return;
  const r=S.reader;const b=bk(r?.bid);if(!r||!b)return;
  if(dx<0&&r.ch<b.ch)navReader(1);
  else if(dx>0&&r.ch>1)navReader(-1);
}
function changeFontSize(d){S.fontSize=Math.min(22,Math.max(13,S.fontSize+d));applyFont();debouncedSave();render();}

function closeReader(){S.reader=null;RS.verses=[];RS.loading=false;RS.error=false;RS.scrollPct=0;render();}
function navReader(dir){if(!S.reader)return;S.reader.ch+=dir;RS.verses=[];RS.loading=false;RS.error=false;RS.scrollPct=0;render();loadReaderVerses();}
async function loadReaderVerses(){
  const r=S.reader;if(!r)return;
  const key=r.bid+'-'+r.ch;
  if(verseCache[key]){RS.verses=verseCache[key];RS.loading=false;RS.error=false;render();return;}
  RS.loading=true;RS.error=false;RS.verses=[];render();
  try{const v=await fetchChapterVerses(r.bid,r.ch);RS.verses=v;RS.loading=false;RS.error=(v.length===1&&v[0].includes('Unable'));}
  catch(e){RS.loading=false;RS.error=true;}
  render();
}

// ── SHARE ─────────────────────────────────────────────────────────────────────
function shareVerse(ref,text){
  const shareText=`"${text}"\n— ${ref}\n\nRead on VerseTrack`;
  if(navigator.share){navigator.share({title:'VerseTrack',text:shareText}).catch(()=>{});}
  else if(navigator.clipboard){navigator.clipboard.writeText(shareText).then(()=>toast('Verse copied — paste to share!'));}
  else toast('Copy: "'+text+'" — '+ref);
}
function shareMilestone(id){
  const m=MILESTONES.find(x=>x.id===id);if(!m)return;
  const txt=`I just earned the "${m.name}" badge on VerseTrack! 📖🎉`;
  if(navigator.share)navigator.share({title:'VerseTrack Milestone',text:txt}).catch(()=>{});
  else if(navigator.clipboard)navigator.clipboard.writeText(txt).then(()=>toast('Milestone copied!'));
}

function rBadgePop(){if(!S.badgePop)return'';const m=S.badgePop;return`<div class="badge-pop" onclick="S.badgePop=null;render()"><div class="badge-inner popin"><div style="font-size:44px;color:var(--acc);margin-bottom:10px"><i class="ti ${m.icon}"></i></div><div style="font-size:10px;color:var(--acc);letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px">Badge Unlocked!</div><div style="font-family:Cinzel,serif;font-size:17px;margin-bottom:5px">${m.name}</div><div style="font-size:12px;color:var(--mut);margin-bottom:13px">You earned a new milestone 🎉</div><button class="btn-s" onclick="shareMilestone('${m.id}');S.badgePop=null;render()"><i class="ti ti-share"></i> Share</button></div></div>`;}


// ── PRAYER REPLIES ────────────────────────────────────────────────────────────
function rReplyModal(circleId, prayerId, authorName){
  const prayers=S.circlePrayers[circleId]||[];
  const prayer=prayers.find(p=>p.id===prayerId);
  const replies=prayer?.replies||[];
  let html='<div style="font-family:Cinzel,serif;font-size:18px;margin-bottom:3px">Replies</div>';
  html+='<div style="font-size:12px;color:var(--mut);margin-bottom:13px">Encouragement for '+authorName+'</div>';
  if(replies.length){
    html+='<div style="margin-bottom:13px">';
    replies.forEach(r=>{
      const col=AVCOLORS[Math.abs((r.user||'').charCodeAt(0)||0)%AVCOLORS.length];
      html+='<div class="reply-row"><div class="mav" style="background:'+col+';width:26px;height:26px;font-size:10px;flex-shrink:0">'+(r.user||'?')[0].toUpperCase()+'</div>';
      html+='<div><div style="font-weight:500;font-size:12px">'+r.user+'</div><div style="color:var(--txt)">'+r.text+'</div></div></div>';
    });
    html+='</div>';
  } else {
    html+='<div style="font-size:13px;color:var(--mut);margin-bottom:13px">No replies yet. Be the first to encourage!</div>';
  }
  html+='<textarea class="inp" id="replyTxt" rows="3" placeholder="Write an encouraging message..." style="margin-bottom:11px"></textarea>';
  html+='<button class="btn-a" onclick="submitReply()">Send Reply</button>';
  html+='<button class="btn-g" style="margin-top:8px" onclick="closeModal()">Close</button>';
  return html;
}
function openReplyModal(cid,pid,authorName){
  S._rcid=cid;S._rpid=pid;
  S.modal={type:'reply',cid,pid,authorName};render();
}
async function submitReply(){
  const cid=S._rcid,pid=S._rpid;
  const txt=document.getElementById('replyTxt')?.value?.trim()||'';
  if(!txt){toast('Please write a reply');return;}
  try{
    const ref=db.collection('circles').doc(cid).collection('prayers').doc(pid);
    await ref.update({replies:firebase.firestore.FieldValue.arrayUnion({uid:currentUser.uid,user:S.user.name,text:txt,at:Date.now()})});
    closeModal();toast('Reply sent 🙏');
  }catch(e){toast('Error: '+e.message);}
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
function nav(scr){S.screen=scr;S.modal=null;S.reader=null;S.searchQuery='';RS.verses=[];RS.loading=false;RS.error=false;RS.scrollPct=0;if(scr==='circles')loadCircles();if(scr==='stats')preCacheToday();render();}
function openModal(t,d={}){S.modal={type:t,...d};render();}
function closeModal(){S.modal=null;render();}
function openBook(bid){openModal('book',{bid});}
function openReader(bid,ch){S.modal=null;S.reader={bid,ch:parseInt(ch)};RS.verses=[];RS.loading=false;RS.error=false;RS.scrollPct=0;render();loadReaderVerses();}
function openNote(bid,ch){S.modal={type:'note',bid,ch};render();}
function removeHL(key){delete S.highlights[key];debouncedSave();render();}

async function doLogin(){const e=G('fe')?.value?.trim()||'';const p=G('fp')?.value||'';if(!e||!p){toast('Please fill all fields');return;}try{await auth.signInWithEmailAndPassword(e,p);}catch(err){toast(err.code==='auth/invalid-credential'||err.code==='auth/wrong-password'?'Invalid email or password':err.message||'Sign in failed');}}
async function doSignup(){const n=G('fn')?.value?.trim()||'';const e=G('fe')?.value?.trim()||'';const p=G('fp')?.value||'';if(!n||!e||!p){toast('Please fill all fields');return;}if(p.length<6){toast('Password must be 6+ characters');return;}try{const cred=await auth.createUserWithEmailAndPassword(e,p);S.user={name:n,email:e};await db.collection('users').doc(cred.user.uid).set({name:n,email:e,completedChapters:[],highlights:{},notes:{},activePlans:[],planStartDates:{},streak:{current:0,best:0,graceUsed:false,lastRead:null,graceMonth:null},activity:{},selectedTrans:'kjv',theme:'auto',fontSize:16,onboarded:false,createdAt:firebase.firestore.FieldValue.serverTimestamp()});S.screen='onboard';S.obStep=0;lsSave();render();}catch(err){toast(err.code==='auth/email-already-in-use'?'Email already in use':err.message||'Sign up failed');}}
async function doSignout(){if(unsubCircles){unsubCircles();unsubCircles=null;}Object.values(unsubPrayers).forEach(u=>u());unsubPrayers={};S.circles=[];S.circlePrayers={};S.circleMembers={};lsClear();try{await auth.signOut();}catch(e){}S.screen='auth';currentUser=null;render();}

function startPlan(pid){S.activePlans.add(pid);if(!S.planStartDates[pid])S.planStartDates[pid]=new Date().toISOString().slice(0,10);S.plansTab='active';debouncedSave();render();toast('Plan started!');preCacheToday();}
function removePlan(pid){if(!confirm('Remove this plan?'))return;S.activePlans.delete(pid);delete S.planStartDates[pid];debouncedSave();render();}
function recalc(pid){const p=PLANS.find(x=>x.id===pid);if(!p)return;const done=p.chapters.filter(c=>chRead(c.bid,c.ch)).length;const d=new Date();d.setDate(d.getDate()-done);S.planStartDates[pid]=d.toISOString().slice(0,10);debouncedSave();toast('Plan recalculated!');render();}
function setTrans(id){S.selectedTrans=id;debouncedSave();render();}
function setTheme(t){S.theme=t;applyTheme();debouncedSave();render();}
function useGrace(){const today=new Date().toISOString().slice(0,7);if(S.streak.graceMonth===today&&S.streak.graceUsed){toast('Grace Day already used this month');return;}S.streak.graceUsed=true;S.streak.graceMonth=today;S.streak.lastRead=new Date().toISOString().slice(0,10);debouncedSave();toast('Grace Day used — streak protected ✓');render();}
function toggleCh(bid,ch){const k=ck(bid,ch);if(S.completedChapters.has(k))S.completedChapters.delete(k);else{S.completedChapters.add(k);markReadToday();}debouncedSave();chkBadge();render();}
function markAll(bid){const b=bk(bid);for(let i=1;i<=b.ch;i++)S.completedChapters.add(ck(bid,i));markReadToday();debouncedSave();chkBadge();render();toast(b.name+' complete!');}
function unmarkAll(bid){const b=bk(bid);for(let i=1;i<=b.ch;i++)S.completedChapters.delete(ck(bid,i));debouncedSave();render();}
function toggleHL(key,text){if(S.highlights[key])delete S.highlights[key];else S.highlights[key]=text.slice(0,120)+(text.length>120?'…':'');debouncedSave();render();}
function saveNote(bid,ch){const ta=G('nta');if(!ta)return;const key=ck(bid,ch);if(ta.value.trim()){if(S.notes[key]&&S.notes[key]!==ta.value.trim())S.notes['tc-'+key]=S.notes[key];S.notes[key]=ta.value.trim();}else delete S.notes[key];debouncedSave();closeModal();toast('Note saved');}
function deleteNote(bid,ch){delete S.notes[ck(bid,ch)];debouncedSave();closeModal();}

async function tapPray(cid,pid,prayed){if(!db)return;try{const ref=db.collection('circles').doc(cid).collection('prayers').doc(pid);if(prayed)await ref.update({prays:firebase.firestore.FieldValue.arrayRemove(currentUser.uid)});else await ref.update({prays:firebase.firestore.FieldValue.arrayUnion(currentUser.uid)});toast(prayed?'Removed':'Prayed 🙏');}catch(e){toast('Error: '+e.message);}}
async function createCircle(){const name=G('cname')?.value?.trim()||'';const plan=G('cplan')?.value||'';if(!name){toast('Please enter a name');return;}toast('Creating…');try{const code=Math.random().toString(36).substr(2,6).toUpperCase();const p=PLANS.find(x=>x.id===plan);await db.collection('circles').add({name,code,planId:plan||null,planName:p?.name||'',createdBy:currentUser.uid,memberUids:[currentUser.uid],members:[{uid:currentUser.uid,name:S.user.name}],createdAt:firebase.firestore.FieldValue.serverTimestamp()});closeModal();toast('Circle created! Code: '+code);}catch(e){toast('Error: '+e.message);}}
async function joinCircle(){const code=G('jcode')?.value?.toUpperCase()?.trim()||'';if(!code||code.length!==6){toast('Please enter a 6-letter code');return;}toast('Joining…');try{const snap=await db.collection('circles').where('code','==',code).get();if(snap.empty){toast('Circle not found');return;}const doc=snap.docs[0];const data=doc.data();if(data.memberUids?.includes(currentUser.uid)){toast('Already in this circle');return;}await db.collection('circles').doc(doc.id).update({memberUids:firebase.firestore.FieldValue.arrayUnion(currentUser.uid),members:firebase.firestore.FieldValue.arrayUnion({uid:currentUser.uid,name:S.user.name})});closeModal();toast('Joined "'+data.name+'"!');}catch(e){toast('Error: '+e.message);}}
async function leaveCircle(cid,name,createdBy){const own=createdBy===currentUser?.uid;if(!confirm(own?`Delete "${name}"?`:`Leave "${name}"?`))return;try{if(own){const pr=await db.collection('circles').doc(cid).collection('prayers').get();for(const d of pr.docs)await d.ref.delete();await db.collection('circles').doc(cid).delete();}else{const cd=await db.collection('circles').doc(cid).get();const me=(cd.data()?.members||[]).find(m=>m.uid===currentUser.uid);const upd={memberUids:firebase.firestore.FieldValue.arrayRemove(currentUser.uid)};if(me)upd.members=firebase.firestore.FieldValue.arrayRemove(me);await db.collection('circles').doc(cid).update(upd);}if(unsubPrayers[cid]){unsubPrayers[cid]();delete unsubPrayers[cid];}S.circles=S.circles.filter(c=>c.id!==cid);delete S.circleMembers[cid];delete S.circlePrayers[cid];toast(own?`"${name}" deleted`:`Left "${name}"`);render();}catch(e){toast('Permission error — update Firestore rules');console.error(e);}}
async function addPrayer(){const cid=G('pcirc')?.value||S.circles[0]?.id||'';const ref=G('pref')?.value||'';const req=G('preq')?.value?.trim()||'';if(!req){toast('Please enter your request');return;}try{await db.collection('circles').doc(cid).collection('prayers').add({user:S.user.name,uid:currentUser.uid,ref:ref||'Personal',text:req,prays:[],createdAt:firebase.firestore.FieldValue.serverTimestamp()});closeModal();toast('Prayer request posted 🙏');}catch(e){toast('Error: '+e.message);}}
function copyCode(code){const text=`Join my VerseTrack circle! Code: ${code}`;if(navigator.share)navigator.share({title:'VerseTrack Invite',text}).catch(()=>{});else if(navigator.clipboard)navigator.clipboard.writeText(text).then(()=>toast('Invite copied!'));else toast('Code: '+code);}
function requestNotificationPermission(){if(!('Notification' in window)){toast('Notifications not supported');return;}Notification.requestPermission().then(p=>{if(p==='granted')toast('Daily reminders enabled ✓');else toast('Notifications blocked — enable in settings');});}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  const ms=G('mS'),navEl=G('bN'),s1=G('mSl'),s2=G('mSl2'),s3=G('mSl3');if(!ms)return;
  if(!currentUser&&S.screen!=='onboard'){navEl.style.display='none';ms.innerHTML=rAuth();s1.innerHTML='';s2.innerHTML='';s3.innerHTML='';return;}
  if(S.screen==='onboard'){navEl.style.display='none';ms.innerHTML=rOnboard();s1.innerHTML='';s2.innerHTML='';s3.innerHTML='';return;}
  navEl.style.display='flex';
  const ns=['journal','highlights','stats'].includes(S.screen)?S.screen==='stats'?'stats':'home':S.screen;
  document.querySelectorAll('.nb').forEach(b=>b.classList.toggle('act',b.id==='nb-'+ns));
  switch(S.screen){
    case'home':ms.innerHTML=rHome();break;
    case'plans':ms.innerHTML=rPlans();break;
    case'circles':ms.innerHTML=rCircles();break;
    case'biblemap':ms.innerHTML=rBibleMap();break;
    case'profile':ms.innerHTML=rProfile();break;
    case'journal':ms.innerHTML=rJournal();break;
    case'highlights':ms.innerHTML=rHighlights();break;
    case'stats':ms.innerHTML=rStats();break;
  }
  s1.innerHTML=S.modal?rModal():'';
  s2.innerHTML=S.reader?rReader():'';
  s3.innerHTML=S.badgePop?rBadgePop():'';
}

// ── ONLINE/OFFLINE ────────────────────────────────────────────────────────────
function updateOnlineStatus(){const b=G('offlineBar');if(!b)return;if(navigator.onLine){b.classList.remove('show');if(currentUser)debouncedSave();}else b.classList.add('show');}
window.addEventListener('online',updateOnlineStatus);
window.addEventListener('offline',updateOnlineStatus);

// ── SERVICE WORKER ────────────────────────────────────────────────────────────
if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').then(r=>{navigator.serviceWorker.addEventListener('message',e=>{if(e.data?.type==='REFRESH_VERSE')render();});}).catch(()=>{});}

// ── START ─────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded',()=>{
  vcLoad();// prime verse cache before anything renders
  if(!navigator.onLine){const m=G('loadingMsg');if(m)m.textContent='Offline — loading from cache…';}
  initFirebase();updateOnlineStatus();
});
</script>
</body>
